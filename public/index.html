<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta name="theme-color" content="#4f46e5" />

    <!-- Open Graph -->
    <meta property="og:title" content="Anonymous Mental Health Support Chat" />
